<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      width: 380px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bubble-wrap {
      position: relative;
      width: 380px;
      height: 220px;
    }

    #bubble-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      transition: filter 0.4s ease;
    }

    /* Emotion tints via hue-rotate on the gray bubble */
    #bubble-img.happy     { filter: hue-rotate(100deg) saturate(1.5) brightness(1.1); }
    #bubble-img.energized { filter: hue-rotate(40deg)  saturate(2)   brightness(1.1); }
    #bubble-img.sad       { filter: hue-rotate(200deg) saturate(1.3) brightness(0.9); }
    #bubble-img.angry     { filter: hue-rotate(320deg) saturate(2.5) brightness(1.0); }
    #bubble-img.stressed  { filter: hue-rotate(20deg)  saturate(2)   brightness(1.0); }
    #bubble-img.cunning   { filter: hue-rotate(260deg) saturate(1.8) brightness(1.0); }
    #bubble-img.neutral   { filter: none; }

    #text {
      position: absolute;
      top: 12%;
      left: 10%;
      width: 80%;
      height: 62%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      word-wrap: break-word;
      overflow: hidden;
      line-height: 1.4;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #text.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="bubble-wrap">
    <img id="bubble-img" src="../assets/bubble.png" class="neutral"/>
    <div id="text"></div>
  </div>

  <script>
    const img   = document.getElementById('bubble-img')
    const text  = document.getElementById('text')

    const EMOTIONS = ['happy','energized','sad','angry','stressed','cunning','neutral']

    window.electronAPI.onBubble(({ message, emotion }) => {
      // Set emotion tint
      img.className = EMOTIONS.includes(emotion) ? emotion : 'neutral'

      // Set text
      text.classList.remove('visible')
      setTimeout(() => {
        text.textContent = message
        // Scale font down if text is long
        const len = message.length
        text.style.fontSize = len > 120 ? '11px' : len > 80 ? '13px' : len > 40 ? '14px' : '15px'
        text.classList.add('visible')
      }, 150)
    })

    window.electronAPI.onBubbleHide(() => {
      text.classList.remove('visible')
    })
  </script>
</body>
</html>
