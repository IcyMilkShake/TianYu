<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
    }

    #bubble-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

#bubble-img {
  transform-origin: center center;
  transform: scaleX(-1);
  position: absolute;
  top: 0;
  left: 2%;
  width: 100%;
  height: 100%;
}
    img {
        border: 0
    }

#bubble-img.energized { filter: hue-rotate(180deg) saturate(3) brightness(1.1); }
#bubble-img.angry     { filter: hue-rotate(120deg) saturate(3) brightness(1.0); }
#bubble-img.tired     { filter: hue-rotate(60deg)  saturate(2) brightness(0.9); }
#bubble-img.neutral   { filter: none; }

    #text {
      position: absolute;
      top: 12%;
      left: 10%;
      width: 80%;
      height: 62%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Pixelify Sans', monospace;
      font-size: 15px;
      font-weight: 400;
      color: #1a1a2e;
      word-wrap: break-word;
      overflow: hidden;
      line-height: 1.4;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #text.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="bubble-wrap">
    <img id="bubble-img" src="../assets/bubble.png" class="neutral"/>
    <div id="text"></div>
  </div>

  <script>
    const img  = document.getElementById('bubble-img')
    const text = document.getElementById('text')
    const EMOTIONS = ['energized', 'tired', 'angry', 'neutral']

    window.electronAPI.onBubble(({ message, emotion, bubbleSrc }) => {
      console.log("Received bubble event with emotion:", emotion, "and message:", message)
      img.src = bubbleSrc
      img.className = EMOTIONS.includes(emotion) ? emotion : 'neutral'

      text.classList.remove('visible')
      const len = message.length
      text.style.fontSize = len > 120 ? '11px' : len > 80 ? '13px' : len > 40 ? '14px' : '15px'

      setTimeout(() => {
        text.textContent = message
        text.classList.add('visible')
        console.log("Bubble displayed with message:", message)
      }, 150)
    })

    window.electronAPI.onBubbleHide(() => {
      text.classList.remove('visible')
    })
  </script>
</body>
</html>
