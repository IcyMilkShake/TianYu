<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Desktop Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px;
    }

    #status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d0d0d0;
      transition: background 0.2s;
    }

    #status-dot.listening {
      background: #ef4444;
      animation: pulse 1s ease-in-out infinite;
    }

    #status-dot.processing {
      background: #f59e0b;
      animation: pulse 0.5s ease-in-out infinite;
    }

    #status-dot.done {
      background: #22c55e;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(1.3); }
    }

    #status-label {
      font-size: 13px;
      color: #9ca3af;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #transcript-box {
      width: 100%;
      max-width: 640px;
      min-height: 120px;
      border: 1.5px solid #e5e7eb;
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #transcript {
      font-size: 22px;
      font-weight: 400;
      color: #111827;
      line-height: 1.5;
      text-align: center;
      word-break: break-word;
    }

    #transcript.placeholder {
      color: #d1d5db;
      font-size: 16px;
    }

    #hint {
      font-size: 13px;
      color: #d1d5db;
    }

    #hint kbd {
      font-family: inherit;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div style="display:flex; align-items:center; gap:10px;">
    <div id="status-dot"></div>
    <span id="status-label">idle</span>
  </div>

  <div id="transcript-box">
    <p id="transcript" class="placeholder">Hold Right Alt and speak…</p>
  </div>

  <p id="hint">Hold <kbd>Right Alt</kbd> to record &nbsp;·&nbsp; Release to transcribe</p>

  <script>
    const dot = document.getElementById('status-dot')
    const label = document.getElementById('status-label')
    const transcript = document.getElementById('transcript')

    function setStatus(state) {
      dot.className = state
      label.textContent = state === 'done' ? 'ready' : state
    }

    // Receive events from main process via contextBridge
    window.electronAPI.onStatus((state) => {
      setStatus(state)
      if (state === 'listening') {
        transcript.textContent = '…'
        transcript.classList.remove('placeholder')
      }
      if (state === 'processing') {
        transcript.textContent = 'Transcribing…'
      }
    })

    window.electronAPI.onTranscript((text) => {
      setStatus('done')
      if (text && text.length > 0) {
        transcript.textContent = text
        transcript.classList.remove('placeholder')
      } else {
        transcript.textContent = '(nothing heard)'
        transcript.classList.add('placeholder')
      }
    })

    window.electronAPI.onError((msg) => {
      setStatus('')
      transcript.textContent = '⚠ ' + msg
      transcript.classList.remove('placeholder')
      transcript.style.color = '#ef4444'
    })
  </script>
</body>
</html>
